<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHESS WITH ABI</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    background: #ffc0cb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start; /* Start from top to control spacing better */
    font-family: 'Baloo 2', cursive;
    color: black;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    padding: 0;
    box-sizing: border-box;
  }

  /* Lane 1: Dedicated Notification Space */
  #statusPopup {
    height: 40px;
    margin-top: 5px;
    font-size: 24px; /* Scaled down slightly to prevent overlap */
    color: #ff0055;
    font-weight: 800;
    text-shadow: 1px 1px 0px white;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  /* Lane 2: The Title */
  h2 {
    font-size: clamp(28px, 4vh, 40px); /* Slightly smaller to fit everything */
    margin: 0;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: underline;
    line-height: 1;
  }
  h2::before, h2::after { content: "🎀"; font-size: 0.8em; }

  /* Lane 3: Turn Indicator */
  #turnIndicator { 
    font-size: clamp(16px, 2.5vh, 22px); 
    margin: 5px 0 10px 0;
    height: 30px;
    transition: color 0.3s ease;
  }

  .white-turn-text {
    color: white;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }

  /* Lane 4: The Board */
  #board-container {
    position: relative;
    height: 70vh; /* Perfectly sized for no-scroll */
    width: 70vh;
    border: 8px solid black;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    background: #87ceeb;
  }

  #board-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: 100%;
    height: 100%;
  }

  .square { width: 100%; height: 100%; }
  .light { background-color: #add8e6; }
  .dark { background-color: #87ceeb; }

  .piece {
    position: absolute;
    width: 12.5%;
    height: 12.5%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: calc(70vh / 10);
    cursor: pointer;
    transition: top 0.5s ease-in-out, left 0.5s ease-in-out;
    z-index: 20;
    user-select: none;
  }

  .dot { 
    position: absolute; 
    width: 14px; 
    height: 14px; 
    background: rgba(0,0,0,0.25); 
    border-radius: 50%; 
    z-index: 30;
    cursor: pointer;
    transform: translate(-50%, -50%);
    pointer-events: auto;
  }

  .white-piece { 
    color: #ffffff; 
    text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
  }
  .black-piece { color: #000; }

  /* Lane 5: Footer/Score */
  .panel { 
    margin-top: 10px;
    display: flex; 
    gap: 20px; 
    align-items: center;
  }
  
  .scoreboard { 
    border-radius: 12px; 
    background: #e0f7fa; 
    padding: 2px 20px; 
    font-size: clamp(14px, 2vh, 18px); 
    border: 2px solid black;
  }

  button { 
    padding: 5px 15px; 
    font-size: 14px; 
    border-radius: 10px; 
    background: #87ceeb; 
    border: 2px solid black; 
    cursor: pointer; 
    font-family: 'Baloo 2', cursive;
  }
</style>
</head>
<body>

<div id="statusPopup"></div>
<h2>Chess with Abi</h2>
<div id="turnIndicator">Turn: Abi (White)</div>

<div id="board-container">
  <div id="board-grid"></div>
</div>

<div class="panel">
  <div class="scoreboard">
    Abi: <span id="whiteScore">0</span> — Mauri: <span id="blackScore">0</span>
  </div>
  <button onclick="resetGame()">Reset Board</button>
</div>

<script>
// Logic remains identical for performance and reliability
const gridElement = document.getElementById("board-grid");
const containerElement = document.getElementById("board-container");
const statusPopup = document.getElementById("statusPopup");
const turnIndicator = document.getElementById("turnIndicator");

let selected = null;
let turn = "white";
let whiteScore = 0;
let blackScore = 0;
let isAnimating = false;

const initialBoard = [
  ["r","n","b","q","k","b","n","r"],
  ["p","p","p","p","p","p","p","p"],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["P","P","P","P","P","P","P","P"],
  ["R","N","B","Q","K","B","N","R"]
];
let board = JSON.parse(initialBoard ? JSON.stringify(initialBoard) : "[]");

function pieceSymbol(p){
  const symbols = { p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚", P:"♟",R:"♜",N:"♞",B:"♝",Q:"♛",K:"♚" };
  return symbols[p];
}
function isWhite(p){ return p === p.toUpperCase(); }

function initGame() {
  gridElement.innerHTML = "";
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement("div");
      square.classList.add("square", (r + c) % 2 === 0 ? "light" : "dark");
      square.onclick = () => handleClick(r, c);
      gridElement.appendChild(square);
    }
  }
  renderPieces();
}

function renderPieces() {
  document.querySelectorAll('.piece, .dot').forEach(el => el.remove());
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = board[r][c];
      if (p) {
        const pieceEl = document.createElement("div");
        pieceEl.className = `piece ${isWhite(p) ? 'white-piece' : 'black-piece'}`;
        pieceEl.id = `piece-${r}-${c}`;
        pieceEl.textContent = pieceSymbol(p);
        pieceEl.style.top = `${r * 12.5}%`;
        pieceEl.style.left = `${c * 12.5}%`;
        pieceEl.onclick = () => handleClick(r, c);
        containerElement.appendChild(pieceEl);
      }
    }
  }
  if (turn === 'white') {
    turnIndicator.textContent = "Turn: Abi (White)";
    turnIndicator.className = "white-turn-text";
  } else {
    turnIndicator.textContent = "Turn: Mauri (Black)";
    turnIndicator.className = "";
  }
}

function handleClick(r, c) {
  if (isAnimating) return;
  const piece = board[r][c];
  if (selected) {
    const [sr, sc] = selected;
    const moves = getMoves(sr, sc);
    if (moves.some(m => m[0] === r && m[1] === c)) {
      executeMove(sr, sc, r, c);
      return;
    }
  }
  if (piece && ((turn === "white" && isWhite(piece)) || (turn === "black" && !isWhite(piece)))) {
    selected = [r, c];
    document.querySelectorAll('.dot').forEach(d => d.remove());
    highlightMoves(r, c);
  } else {
    selected = null;
    document.querySelectorAll('.dot').forEach(d => d.remove());
  }
}

function executeMove(sr, sc, tr, tc) {
  isAnimating = true;
  const movingPiece = board[sr][sc];
  const pieceEl = document.getElementById(`piece-${sr}-${sc}`);
  document.querySelectorAll('.dot').forEach(d => d.remove());
  const capturedEl = document.getElementById(`piece-${tr}-${tc}`);
  if (capturedEl) capturedEl.style.opacity = "0";
  pieceEl.style.top = `${tr * 12.5}%`;
  pieceEl.style.left = `${tc * 12.5}%`;
  setTimeout(() => {
    board[tr][tc] = movingPiece;
    board[sr][sc] = "";
    selected = null;
    const opponent = turn === 'white' ? 'black' : 'white';
    if (isCheckmate(opponent)) {
      const winner = turn === 'white' ? 'Abi' : 'Mauri';
      statusPopup.textContent = `${winner} WINS!`;
      if (turn === 'white') whiteScore++; else blackScore++;
      document.getElementById('whiteScore').textContent = whiteScore;
      document.getElementById('blackScore').textContent = blackScore;
      setTimeout(resetGame, 4000);
    } else {
      const kPos = findKing(opponent);
      if (isSquareAttacked(kPos[0], kPos[1], turn)) {
        statusPopup.textContent = "CHECK!";
        setTimeout(() => { if(statusPopup.textContent === "CHECK!") statusPopup.textContent = ""; }, 2000);
      }
      turn = opponent;
      isAnimating = false;
      renderPieces();
    }
  }, 500);
}

function highlightMoves(r, c) {
  const moves = getMoves(sr=r, sc=c); // Fixed parameter passing
  moves.forEach(([mr, mc]) => {
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.style.top = `${mr * 12.5 + 6.25}%`;
    dot.style.left = `${mc * 12.5 + 6.25}%`;
    dot.onclick = (e) => { e.stopPropagation(); handleClick(mr, mc); };
    containerElement.appendChild(dot);
  });
}

function getMoves(r,c){
  const piece = board[r][c]; if(!piece) return [];
  const moves=[];
  const dirs={rook:[[1,0],[-1,0],[0,1],[0,-1]], bishop:[[1,1],[1,-1],[-1,1],[-1,-1]], knight:[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]};
  const addMove=(nr,nc)=>{ if(nr>=0&&nr<8&&nc>=0&&nc<8 && (!board[nr][nc] || isWhite(board[nr][nc])!==isWhite(piece))) moves.push([nr,nc]); };
  switch(piece.toLowerCase()){
    case 'p':
      const d = isWhite(piece)?-1:1;
      if(board[r+d] && !board[r+d][c]) { addMove(r+d,c); if(((isWhite(piece)&&r===6)||(!isWhite(piece)&&r===1)) && !board[r+d*2][c]) addMove(r+d*2,c); }
      [[d,1],[d,-1]].forEach(([dr,dc])=>{ const nr=r+dr,nc=c+dc; if(nr>=0&&nr<8&&nc>=0&&nc<8 && board[nr][nc] && isWhite(board[nr][nc])!==isWhite(piece)) moves.push([nr,nc]); });
      break;
    case 'r': case 'q': dirs.rook.forEach(([dr,dc])=>{ let nr=r+dr,nc=c+dc; while(nr>=0&&nr<8&&nc>=0&&nc<8){ if(!board[nr][nc]) moves.push([nr,nc]); else { if(isWhite(board[nr][nc])!==isWhite(piece)) moves.push([nr,nc]); break; } nr+=dr; nc+=dc; } });
      if(piece.toLowerCase()!=='q') break;
    case 'b': case 'q': dirs.bishop.forEach(([dr,dc])=>{ let nr=r+dr,nc=c+dc; while(nr>=0&&nr<8&&nc>=0&&nc<8){ if(!board[nr][nc]) moves.push([nr,nc]); else { if(isWhite(board[nr][nc])!==isWhite(piece)) moves.push([nr,nc]); break; } nr+=dr; nc+=dc; } }); break;
    case 'n': dirs.knight.forEach(([dr,dc])=>addMove(r+dr,c+dc)); break;
    case 'k': for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) if(dr!==0||dc!==0) addMove(r+dr,c+dc); break;
  }
  return moves;
}

function findKing(color){ for(let r=0;r<8;r++) for(let c=0;c<8;c++){ const p=board[r][c]; if(p && p.toLowerCase()==='k' && (color==='white' ? isWhite(p):!isWhite(p))) return [r,c]; } }
function isSquareAttacked(r,c,atkr){ for(let i=0;i<8;i++) for(let j=0;j<8;j++){ const p=board[i][j]; if(p && ((atkr==='white')?isWhite(p):!isWhite(p))) if(getMoves(i,j).some(m=>m[0]===r && m[1]===c)) return true; } return false; }
function isCheckmate(color){
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const p=board[r][c]; if(p && ((color==='white')?isWhite(p):!isWhite(p))){
      const moves=getMoves(r,c);
      for(const [nr,nc] of moves){
        const backup=board[nr][nc]; board[nr][nc]=board[r][c]; board[r][c]="";
        const kPos=findKing(color); if(!kPos) return true;
        const safe = !isSquareAttacked(kPos[0],kPos[1],color==='white'?'black':'white');
        board[r][c]=board[nr][nc]; board[nr][nc]=backup; if(safe) return false;
      }
    }
  } return true;
}

function resetGame(){ 
  board=JSON.parse(JSON.stringify(initialBoard)); 
  selected=null; 
  turn="white"; 
  isAnimating = false;
  statusPopup.textContent = ""; 
  initGame(); 
}
initGame();
</script>
</body>
</html>
